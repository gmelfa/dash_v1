<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo azul escuro (cor do Grupo SEB) -->
  <rect width="64" height="64" fill="#1e3a5f" rx="8"/>
  
  <!-- Ícone de gráfico/dashboard em branco/dourado -->
  <g fill="#f4a460" stroke="#ffffff" stroke-width="1.5">
    <!-- Barra 1 -->
    <rect x="12" y="36" width="8" height="16" rx="2"/>
    <!-- Barra 2 -->
    <rect x="24" y="28" width="8" height="24" rx="2"/>
    <!-- Barra 3 -->
    <rect x="36" y="20" width="8" height="32" rx="2"/>
    <!-- Barra 4 -->
    <rect x="48" y="32" width="8" height="20" rx="2"/>
  </g>
  
  <!-- Linha de tendência -->
  <path d="M 14 42 L 28 34 L 40 26 L 52 38" 
        stroke="#ffffff" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Ponto de destaque -->
  <circle cx="40" cy="26" r="3" fill="#ffffff"/>
  
  <!-- Texto SEB (pequeno, opcional) -->
  <text x="32" y="14" 
        font-family="Arial, sans-serif" 
        font-size="10" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">SEB</text>
</svg>
